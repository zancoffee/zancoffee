<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <style>
      .stroke { fill: none; stroke: #1a1814; stroke-linecap: square; stroke-linejoin: miter; }
    </style>
  </defs>

  <!-- Z -->
  <!-- top bar -->
  <line class="stroke" stroke-width="10" x1="30" y1="30" x2="170" y2="30"/>
  <!-- diagonal -->
  <line class="stroke" stroke-width="10" x1="170" y1="30" x2="30" y2="170"/>
  <!-- bottom bar -->
  <line class="stroke" stroke-width="10" x1="30" y1="170" x2="170" y2="170"/>

  <!-- A -->
  <!-- left leg -->
  <line class="stroke" stroke-width="10" x1="230" y1="170" x2="300" y2="30"/>
  <!-- right leg -->
  <line class="stroke" stroke-width="10" x1="300" y1="30" x2="370" y2="170"/>
  <!-- crossbar -->
  <line class="stroke" stroke-width="10" x1="252" y1="118" x2="348" y2="118"/>

  <!-- N -->
  <!-- left vertical -->
  <line class="stroke" stroke-width="10" x1="430" y1="170" x2="430" y2="30"/>
  <!-- diagonal -->
  <line class="stroke" stroke-width="10" x1="430" y1="30" x2="570" y2="170"/>
  <!-- right vertical -->
  <line class="stroke" stroke-width="10" x1="570" y1="30" x2="570" y2="170"/>

</svg>
