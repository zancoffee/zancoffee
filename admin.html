<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZAN Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 300;
  background: #f5f2ed;
  color: #1a1814;
  min-height: 100vh;
  word-break: keep-all;
  overflow-wrap: break-word;
}

/* ── LOGIN ── */
.login-wrap {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; flex-direction: column; gap: 28px;
  background: #f5f2ed;
}
.login-title {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px; color: #888;
  letter-spacing: 0.2em; text-transform: uppercase;
}
.login-box { display: flex; flex-direction: column; gap: 10px; width: 260px; }
.login-box input {
  background: #fff;
  border: 1px solid #ddd;
  color: #1a1814;
  padding: 12px 14px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px; outline: none;
  transition: border-color 0.15s;
}
.login-box input:focus { border-color: #1a1814; }
.login-btn {
  background: #1a1814; color: #f5f2ed;
  border: none; padding: 12px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
  cursor: pointer; transition: opacity 0.15s;
}
.login-btn:hover { opacity: 0.8; }
.login-err {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px; color: #b94040; text-align: center;
}

/* ── ADMIN LAYOUT ── */
.admin-wrap { display: none; }
.admin-wrap.on { display: flex; min-height: 100vh; }

.admin-sidebar {
  width: 200px; flex-shrink: 0;
  position: fixed; top: 0; left: 0; height: 100vh;
  background: #fff;
  border-right: 1px solid #e0dbd3;
  display: flex; flex-direction: column;
  padding: 36px 24px;
}
.admin-logo-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px; color: #bbb;
  letter-spacing: 0.2em; text-transform: uppercase;
  margin-bottom: 6px;
}
.admin-logo-name {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 17px; color: #1a1814;
  letter-spacing: 0.04em; margin-bottom: 36px;
}
.admin-logo-name span { color: #bbb; }
.admin-nav { display: flex; flex-direction: column; gap: 1px; }
.admin-nav-item {
  font-size: 12px; color: #999;
  padding: 7px 10px; cursor: pointer;
  transition: background 0.12s, color 0.12s;
  border-radius: 4px; user-select: none;
  letter-spacing: 0.01em;
}
.admin-nav-item:hover { background: #f5f2ed; color: #1a1814; }
.admin-nav-item.on { background: #1a1814; color: #fff; font-weight: 500; }

.admin-sidebar-foot {
  margin-top: auto; display: flex; flex-direction: column; gap: 8px;
}
.goto-site {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px; color: #aaa;
  text-decoration: none; letter-spacing: 0.08em;
  transition: color 0.15s;
}
.goto-site:hover { color: #1a1814; }
.logout-btn {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px; color: #bbb;
  background: none; border: none; cursor: pointer;
  text-align: left; letter-spacing: 0.08em;
  transition: color 0.15s; padding: 0;
}
.logout-btn:hover { color: #b94040; }

/* ── MAIN CONTENT ── */
.admin-content { margin-left: 200px; flex: 1; padding: 44px 52px; }

/* ── PANEL ── */
.panel { display: none; }
.panel.on { display: block; }

.panel-header {
  display: flex; align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 32px;
  padding-bottom: 18px;
  border-bottom: 1px solid #ddd;
}
.panel-meta {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px; color: #aaa;
  letter-spacing: 0.14em; text-transform: uppercase;
  margin-bottom: 5px;
}
.panel-heading { font-size: 20px; font-weight: 400; color: #1a1814; }

.add-btn {
  background: #1a1814; color: #fff;
  border: none; padding: 9px 18px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
  cursor: pointer; transition: opacity 0.15s; white-space: nowrap;
  border-radius: 3px;
}
.add-btn:hover { opacity: 0.75; }

/* ── ITEM LIST ── */
.item-list { display: flex; flex-direction: column; gap: 6px; }
.item-row {
  background: #fff;
  border: 1px solid #e8e3db;
  border-radius: 6px;
  padding: 16px 20px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 16px; align-items: center;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.item-row:hover { border-color: #c8b89a; box-shadow: 0 1px 6px rgba(0,0,0,0.05); }
.item-row-cat {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase;
  color: #aaa; margin-bottom: 4px;
}
.item-row-title { font-size: 14px; font-weight: 400; color: #1a1814; margin-bottom: 3px; }
.item-row-sub { font-size: 11px; color: #888; font-family: 'IBM Plex Mono', monospace; }
.item-row-body-preview {
  font-size: 11px; color: #aaa; margin-top: 4px;
  font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 400px;
}
.item-row-actions { display: flex; gap: 6px; flex-shrink: 0; }
.edit-btn, .del-btn {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase;
  padding: 6px 12px; border-radius: 3px; cursor: pointer; transition: all 0.15s;
}
.edit-btn { background: #f0ede8; color: #555; border: 1px solid #e0dbd3; }
.edit-btn:hover { background: #e8e3db; color: #1a1814; }
.del-btn { background: transparent; color: #bbb; border: 1px solid #e8e3db; }
.del-btn:hover { border-color: #b94040; color: #b94040; }

/* ── MODAL ── */
.modal-bg {
  display: none; position: fixed; inset: 0;
  background: rgba(26,24,20,0.45);
  z-index: 500; align-items: center; justify-content: center;
}
.modal-bg.on { display: flex; }
.modal {
  background: #fff;
  border: 1px solid #ddd;
  border-radius: 8px;
  width: 580px; max-width: 92vw;
  max-height: 90vh; overflow-y: auto;
  padding: 32px 36px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.12);
}
.modal-title {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
  color: #888; margin-bottom: 24px;
}
.form-group { margin-bottom: 18px; }
.form-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
  color: #888; display: block; margin-bottom: 7px;
}
.form-input, .form-textarea, .form-select {
  width: 100%;
  background: #faf9f7;
  border: 1px solid #ddd;
  color: #1a1814;
  padding: 10px 13px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px; font-weight: 300;
  outline: none; transition: border-color 0.15s;
  border-radius: 3px;
}
.form-input:focus, .form-textarea:focus, .form-select:focus { border-color: #1a1814; background: #fff; }
.form-textarea { height: 90px; resize: vertical; }
.form-textarea.tall { height: 180px; }
.form-select option { background: #fff; }
.form-hint { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #bbb; margin-top: 5px; }
.modal-actions { display: flex; gap: 8px; margin-top: 24px; }
.save-btn {
  background: #1a1814; color: #fff;
  border: none; padding: 10px 22px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
  cursor: pointer; transition: opacity 0.15s; flex: 1;
  border-radius: 3px;
}
.save-btn:hover { opacity: 0.75; }
.cancel-btn {
  background: transparent; color: #888;
  border: 1px solid #ddd; padding: 10px 18px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
  cursor: pointer; transition: all 0.15s; border-radius: 3px;
}
.cancel-btn:hover { border-color: #999; color: #1a1814; }

/* ── CAREER PANEL ── */
.bio-group { margin-bottom: 28px; }
.bio-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
  color: #888; margin-bottom: 8px; display: block;
}
.bio-textarea {
  width: 100%; max-width: 560px;
  background: #fff; border: 1px solid #ddd; border-radius: 3px;
  color: #1a1814; padding: 12px 14px; height: 140px; resize: vertical;
  font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 300;
  outline: none; transition: border-color 0.15s;
}
.bio-textarea:focus { border-color: #1a1814; }
.section-divider {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
  color: #aaa; margin: 28px 0 14px;
  padding-bottom: 10px; border-bottom: 1px solid #e8e3db;
}

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 28px; right: 28px;
  background: #1a1814; color: #f5f2ed;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px; letter-spacing: 0.08em;
  padding: 11px 18px; border-radius: 4px;
  z-index: 999;
  transform: translateY(60px); opacity: 0;
  transition: all 0.25s ease;
}
.toast.show { transform: translateY(0); opacity: 1; }

/* ── EMPTY ── */
.empty-state {
  padding: 40px 0; text-align: center;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px; color: #bbb; letter-spacing: 0.08em;
}

@media (max-width: 640px) {
  .admin-sidebar { width: 100%; position: static; height: auto; flex-direction: row; flex-wrap: wrap; padding: 16px; }
  .admin-content { margin-left: 0; padding: 20px 16px; }
  .admin-logo-name { margin-bottom: 0; margin-right: 20px; }
  .admin-nav { flex-direction: row; flex-wrap: wrap; gap: 4px; }
  .admin-sidebar-foot { display: none; }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-title">ZAN Admin</div>
  <div class="login-box">
    <input type="password" id="pwInput" placeholder="Password" autocomplete="current-password">
    <button class="login-btn" id="loginBtn">Enter</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- ADMIN -->
<div class="admin-wrap" id="adminWrap">
  <div class="admin-sidebar">
    <div class="admin-logo-label">Admin</div>
    <div class="admin-logo-name">ZAN<span>.</span></div>
    <div class="admin-nav">
      <div class="admin-nav-item on" data-panel="journal">Journal</div>
      <div class="admin-nav-item" data-panel="crew">Crew</div>
      <div class="admin-nav-item" data-panel="tools">Tools</div>
      <div class="admin-nav-item" data-panel="career">Career / Bio</div>
    </div>
    <div class="admin-sidebar-foot">
      <a class="goto-site" href="./index.html" target="_blank">↗ 홈페이지 보기</a>
      <button class="logout-btn" id="logoutBtn">로그아웃</button>
    </div>
  </div>

  <div class="admin-content">

    <!-- JOURNAL -->
    <div class="panel on" id="panel-journal">
      <div class="panel-header">
        <div>
          <div class="panel-meta">Content</div>
          <div class="panel-heading">Journal 관리</div>
        </div>
        <button class="add-btn" data-type="journal">+ 새 글</button>
      </div>
      <div class="item-list" id="list-journal"></div>
    </div>

    <!-- CREW -->
    <div class="panel" id="panel-crew">
      <div class="panel-header">
        <div>
          <div class="panel-meta">Community</div>
          <div class="panel-heading">Crew 활동 관리</div>
        </div>
        <button class="add-btn" data-type="crew">+ 새 활동</button>
      </div>
      <div class="item-list" id="list-crew"></div>
    </div>

    <!-- TOOLS -->
    <div class="panel" id="panel-tools">
      <div class="panel-header">
        <div>
          <div class="panel-meta">Tools &amp; Apps</div>
          <div class="panel-heading">Tools 관리</div>
        </div>
        <button class="add-btn" data-type="tools">+ 새 툴</button>
      </div>
      <div class="item-list" id="list-tools"></div>
    </div>

    <!-- CAREER -->
    <div class="panel" id="panel-career">
      <div class="panel-header">
        <div>
          <div class="panel-meta">About</div>
          <div class="panel-heading">Career / Bio 수정</div>
        </div>
        <button class="add-btn" data-type="career">+ 타임라인 추가</button>
      </div>
      <div class="bio-group">
        <label class="bio-label">Bio 소개글</label>
        <textarea class="bio-textarea" id="bioText"></textarea>
        <div class="form-hint" style="margin-top:6px">문단 구분은 빈 줄(Enter 두 번)</div>
        <button class="save-btn" id="saveBioBtn" style="max-width:120px;margin-top:12px">저장</button>
      </div>
      <div class="section-divider">Timeline</div>
      <div class="item-list" id="list-career"></div>
    </div>

  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-title" id="modalTitle"></div>
    <div id="modalBody"></div>
    <div class="modal-actions">
      <button class="save-btn"   id="modalSave">저장</button>
      <button class="cancel-btn" id="modalCancel">취소</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function () {

  var PW = 'theo2026';

  var defaults = {
    journal: [
      { id:1,  cat:'Competition Prep', title:'미세입자(Fines)는 맛이 아니라 밀도다',            sub:'불균일한 밀도가 만드는 채널링 / 2026.03',      img:'https://images.unsplash.com/photo-1610889556528-9a770e32642f?w=800&q=80', body:'' },
      { id:2,  cat:'Science',          title:'로스팅 커브와 메일라르 반응의 상관관계',            sub:'RoR이 향미 발현에 미치는 영향 / 2026.02',      img:'https://images.unsplash.com/photo-1442512595331-e89e73853f31?w=800&q=80', body:'' },
      { id:3,  cat:'Roasting',         title:'개발 시간(Development Time)을 어떻게 읽을 것인가', sub:'퍼스트 크랙 이후 시간이 미치는 영향 / 2025.11', img:'https://images.unsplash.com/photo-1501339847302-ac426a4a7cbb?w=800&q=80', body:'' },
      { id:4,  cat:'Brewing',          title:'홈카페, 어디서부터 시작할까',                    sub:'장비보다 중요한 것은 물 / 2026.01',             img:'https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=800&q=80', body:'' },
      { id:5,  cat:'Essay',            title:'대구에서 커피를 한다는 것',                      sub:'서울이 아닌 곳에서 나만의 속도로 / 2025.12',    img:'https://images.unsplash.com/photo-1554118811-1e0d58224f24?w=800&q=80', body:'' },
      { id:6,  cat:'Study',            title:'커피 스터디',                                   sub:'Science / 추출 · 로스팅 · 감각평가',             img:'https://images.unsplash.com/photo-1551632436-cbf8dd35adfa?w=800&q=80', body:'' },
      { id:7,  cat:'Content',          title:'유튜브 쇼츠',                                   sub:'Content / Home Cafe · YouTube',                img:'https://images.unsplash.com/photo-1516062423079-7ca13cdc7f5a?w=800&q=80', body:'' },
      { id:8,  cat:'Competition',      title:'대회 지원',                                     sub:'Competition / Brewing · Barista',              img:'https://images.unsplash.com/photo-1585515320310-259814833e62?w=800&q=80', body:'' },
      { id:9,  cat:'Curation',         title:'카페 탐방',                                     sub:'Curation / Nationwide · Review',               img:'https://images.unsplash.com/photo-1521017432531-fbd92d768814?w=800&q=80', body:'' },
      { id:10, cat:'Archive',          title:'아카이브',                                      sub:'Archive / Recipe · Research',                  img:'https://images.unsplash.com/photo-1488590528505-98d2b5aba04b?w=800&q=80', body:'' }
    ],
    crew: [
      { id:1, cat:'Offline', title:'크루 모임', sub:'Offline / Daegu · Regular Meet', img:'https://images.unsplash.com/photo-1504630083234-14187a9df0f5?w=800&q=80', body:'' }
    ],
    tools: [
      { id:1, cat:'Brewing',  title:'추출 계산기',      sub:'TDS · Yield · Ratio',             img:'https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=800&q=80', link:'', body:'' },
      { id:2, cat:'Roasting', title:'로스팅 로그',      sub:'Curve · Note · Compare',           img:'https://images.unsplash.com/photo-1447933601403-0c6688de566e?w=800&q=80', link:'', body:'' },
      { id:3, cat:'Science',  title:'Fines 밀도 분석기', sub:'Particle · Density · Extraction', img:'https://images.unsplash.com/photo-1559496417-e7f25cb247f3?w=800&q=80', link:'', body:'' }
    ],
    career: [
      { id:1, year:'2025 —', title:'잔(ZAN) 커뮤니티 창설 · 콘텐츠 제작', desc:'커피 커뮤니티 잔 설립. 유튜브 쇼츠 및 대회 발표 준비 중.' },
      { id:2, year:'2022',   title:'대구 기반 독립 로스터',               desc:'독립 로스터로 대구에서 새로운 챕터를 시작.' },
      { id:3, year:'2017',   title:'로스터로 전향',                       desc:'생두와 열의 대화, 로스팅의 과학에 깊이 빠져들다.' },
      { id:4, year:'2014',   title:'커피 업계 입문',                      desc:'바리스타로 시작, 추출의 세계에 발을 내딛다.' }
    ],
    bio: '커피를 볶는 일을 직업으로, 탐구하는 일을 취미로, 그리고 나누는 일을 삶의 방식으로 삼고 있습니다.\n\n10년 넘는 시간 동안 바리스타에서 로스터로, 개인 작업자에서 커뮤니티 빌더로 역할이 넓어져왔습니다.\n\n새로운 배움과 경험을 좋아하고, 일만큼 휴식과 여유를 중요하게 생각합니다.'
  };

  // ── STORAGE ──
  function load(key) { try { var v = localStorage.getItem('theo_' + key); return v ? JSON.parse(v) : null; } catch(e) { return null; } }
  function save(key, val) { try { localStorage.setItem('theo_' + key, JSON.stringify(val)); } catch(e) {} }
  function getData(key) { return load(key) || JSON.parse(JSON.stringify(defaults[key] || [])); }
  function nextId(arr) { return arr.reduce(function(m,i){ return Math.max(m, i.id||0); }, 0) + 1; }

  // ── TOAST ──
  var toastEl = document.getElementById('toast'), toastTimer;
  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ toastEl.classList.remove('show'); }, 2200);
  }

  // ── LOGIN ──
  var loginWrap = document.getElementById('loginWrap');
  var adminWrap = document.getElementById('adminWrap');
  var pwInput   = document.getElementById('pwInput');
  var loginErr  = document.getElementById('loginErr');

  function doLogin() {
    if (pwInput.value === PW) {
      loginWrap.style.display = 'none';
      adminWrap.classList.add('on');
      renderAll();
    } else {
      loginErr.textContent = '비밀번호가 틀렸습니다';
      pwInput.value = ''; pwInput.focus();
    }
  }
  document.getElementById('loginBtn').addEventListener('click', doLogin);
  pwInput.addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
  document.getElementById('logoutBtn').addEventListener('click', function(){
    adminWrap.classList.remove('on');
    loginWrap.style.display = 'flex';
    pwInput.value = '';
  });

  // ── PANEL NAV ──
  document.querySelectorAll('.admin-nav-item').forEach(function(item){
    item.addEventListener('click', function(){
      document.querySelectorAll('.admin-nav-item').forEach(function(i){ i.classList.remove('on'); });
      document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('on'); });
      this.classList.add('on');
      var panel = document.getElementById('panel-' + this.getAttribute('data-panel'));
      if(panel) panel.classList.add('on');
    });
  });

  // ── MODAL ──
  var modalBg = document.getElementById('modalBg');
  var saveCallback = null;

  function openModal(title, bodyHTML, onSave) {
    document.getElementById('modalTitle').textContent = title;
    document.getElementById('modalBody').innerHTML = bodyHTML;
    saveCallback = onSave;
    modalBg.classList.add('on');
    var first = document.getElementById('modalBody').querySelector('input,textarea,select');
    if(first) setTimeout(function(){ first.focus(); }, 60);
  }
  function closeModal() { modalBg.classList.remove('on'); saveCallback = null; }

  document.getElementById('modalSave').addEventListener('click', function(){ if(saveCallback) saveCallback(); });
  document.getElementById('modalCancel').addEventListener('click', closeModal);
  modalBg.addEventListener('click', function(e){ if(e.target === modalBg) closeModal(); });

  function emptyState(msg){ return '<div class="empty-state">' + msg + '</div>'; }

  // ── 공통 본문 textarea 스니펫 ──
  function bodyField(val) {
    return '<div class="form-group"><label class="form-label">본문 내용</label>' +
      '<textarea class="form-textarea tall" id="f-body" placeholder="본문을 입력하세요. 빈 줄로 문단을 구분합니다.">' + (val||'') + '</textarea>' +
      '<div class="form-hint">빈 줄(Enter 두 번) = 문단 구분</div></div>';
  }

  // ══════════════════════════════
  function renderJournal() {
    var data = getData('journal');

    list.innerHTML = data.map(function(item){
      var preview = (item.body||'').trim().replace(/\n/g,' ').substring(0,60);
      return '<div class="item-row">' +
        '<div class="item-row-info">' +
          '<div class="item-row-cat">' + (item.cat||'') + '</div>' +
          '<div class="item-row-title">' + item.title + '</div>' +
          '<div class="item-row-sub">' + (item.sub||'') + '</div>' +
          (preview ? '<div class="item-row-body-preview">' + preview + '…</div>' : '') +
        '</div>' +
        '<div class="item-row-actions">' +
          '<button class="edit-btn" data-type="journal" data-id="' + item.id + '">수정</button>' +
          '<button class="del-btn"  data-type="journal" data-id="' + item.id + '">삭제</button>' +
        '</div></div>';
    }).join('');
  }

  function journalForm(item) {
    item = item || {};
    var cats = ['Competition Prep','Science','Roasting','Brewing','Essay','Study','Content','Competition','Curation','Archive','Community'];
    return '<div class="form-group"><label class="form-label">카테고리</label>' +
      '<select class="form-select" id="f-cat">' +
      cats.map(function(c){ return '<option value="'+c+'"'+(item.cat===c?' selected':'')+'>'+c+'</option>'; }).join('') +
      '</select></div>' +
      '<div class="form-group"><label class="form-label">제목</label><input class="form-input" id="f-title" value="' + (item.title||'') + '" placeholder="글 제목"></div>' +
      '<div class="form-group"><label class="form-label">한 줄 요약</label><input class="form-input" id="f-sub" value="' + (item.sub||'') + '" placeholder="설명 / 2026.03"></div>' +
      '<div class="form-group"><label class="form-label">썸네일 이미지 URL</label><input class="form-input" id="f-img" value="' + (item.img||'') + '" placeholder="https://images.unsplash.com/..."><div class="form-hint">Unsplash 등 직접 링크</div></div>' +

  function addJournal() {
    openModal('새 글 작성', journalForm(), function(){

      var data = getData('journal');
      data.unshift({ id: nextId(data), cat: document.getElementById('f-cat').value, title: title,
        sub: document.getElementById('f-sub').value, img: document.getElementById('f-img').value,

      item.cat   = document.getElementById('f-cat').value;

  // ══════════════════════════════
  function renderCareer() {
    var bio = load('bio');
    if(bio === null) bio = defaults.bio;
    document.getElementById('bioText').value = bio;
    var data = getData('career');
    var list = document.getElementById('list-career');
    if(!data.length){ list.innerHTML = emptyState('타임라인이 없습니다'); return; }
    list.innerHTML = data.map(function(item){
      return '<div class="item-row">' +
        '<div class="item-row-info">' +

      item.year  = document.getElementById('f-year').value;

  }

  // ── 버튼 위임 ──
  document.querySelectorAll('.add-btn').forEach(function(btn){
    btn.addEventListener('click', function(){
      var t = this.getAttribute('data-type');
      if(t==='journal') addJournal();
      else if(t==='crew') addCrew();
      else if(t==='tools') addTools();
      else if(t==='career') addCareer();
    });
  });

  document.addEventListener('click', function(e){
    var btn = e.target;
    var type = btn.getAttribute('data-type');
    var id   = btn.getAttribute('data-id');
    if(btn.classList.contains('edit-btn')){
      if(type==='journal') editJournal(id);
      else if(type==='crew') editCrew(id);
      else if(type==='tools') editTools(id);
      else if(type==='career') editCareer(id);
    }
    if(btn.classList.contains('del-btn')){
      if(type==='journal') delJournal(id);
      else if(type==='crew') delCrew(id);
      else if(type==='tools') delTools(id);
      else if(type==='career') delCareer(id);
    }
  });

  function renderAll(){ renderJournal(); renderCrew(); renderTools(); renderCareer(); }

}());
