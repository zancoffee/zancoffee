<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Theo Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 300;
  background: #f5f2ed;
  color: #1a1814;
  min-height: 100vh;
  word-break: keep-all;
  overflow-wrap: break-word;
}

/* LOGIN */
.login-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  flex-direction: column;
  gap: 32px;
  background: #f5f2ed;
}
.login-title {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px;
  color: #9a9488;
  letter-spacing: 0.16em;
  text-transform: uppercase;
}
.login-box {
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: 280px;
}
.login-box input {
  background: #fff;
  border: 1px solid #dcd8d0;
  color: #1a1814;
  padding: 12px 16px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px;
  outline: none;
  transition: border-color 0.15s;
  letter-spacing: 0.08em;
}
.login-box input:focus { border-color: #9a9488; }
.login-btn {
  background: #1a1814;
  color: #f5f2ed;
  border: none;
  padding: 12px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  font-weight: 400;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.15s;
}
.login-btn:hover { background: #3a3630; }
.login-err {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: #b04030;
  text-align: center;
  letter-spacing: 0.06em;
}

/* ADMIN LAYOUT */
.admin-wrap { display: none; }
.admin-wrap.on { display: flex; min-height: 100vh; }

.admin-sidebar {
  width: 200px;
  flex-shrink: 0;
  position: fixed;
  top: 0; left: 0;
  height: 100vh;
  background: #edeae3;
  border-right: 1px solid #dcd8d0;
  display: flex;
  flex-direction: column;
  padding: 36px 24px;
}
.admin-logo {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  color: #b0aa9e;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.admin-logo-name {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 18px;
  color: #1a1814;
  letter-spacing: 0.04em;
  margin-bottom: 40px;
}
.admin-logo-name span { color: #c8c2b5; }
.admin-nav { display: flex; flex-direction: column; gap: 2px; }
.admin-nav-item {
  font-size: 12px;
  color: #b0aa9e;
  padding: 6px 0;
  cursor: pointer;
  transition: color 0.15s;
  letter-spacing: 0.02em;
  user-select: none;
}
.admin-nav-item:hover { color: #5a5448; }
.admin-nav-item.on { color: #1a1814; font-weight: 500; }

.admin-nav-item::before {
  content: '— ';
  color: #d8d3c8;
  font-family: 'IBM Plex Mono', monospace;
}
.admin-nav-item.on::before { color: #9a9488; }

.admin-sidebar-foot {
  margin-top: auto;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.goto-site {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: #b0aa9e;
  text-decoration: none;
  letter-spacing: 0.08em;
  transition: color 0.15s;
}
.goto-site:hover { color: #5a5448; }
.logout-btn {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: #b0aa9e;
  background: none;
  border: none;
  cursor: pointer;
  text-align: left;
  letter-spacing: 0.08em;
  transition: color 0.15s;
  padding: 0;
}
.logout-btn:hover { color: #b04030; }

/* ADMIN CONTENT */
.admin-content {
  margin-left: 200px;
  flex: 1;
  padding: 48px 56px;
  background: #f5f2ed;
}

/* PANEL */
.panel { display: none; }
.panel.on { display: block; }

.panel-header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 40px;
  padding-bottom: 20px;
  border-bottom: 1px solid #dcd8d0;
}
.panel-title {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: #b0aa9e;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.panel-heading {
  font-size: 22px;
  font-weight: 400;
  color: #1a1814;
  letter-spacing: -0.01em;
}
.add-btn {
  background: #1a1814;
  color: #f5f2ed;
  border: none;
  padding: 10px 20px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.15s;
  white-space: nowrap;
}
.add-btn:hover { background: #3a3630; }

/* ITEM LIST */
.item-list { display: flex; flex-direction: column; gap: 1px; }
.item-row {
  background: #fff;
  border: 1px solid #dcd8d0;
  padding: 20px 24px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 20px;
  align-items: center;
  transition: border-color 0.15s;
}
.item-row:hover { border-color: #c8c2b5; }
.item-row-info {}
.item-row-cat {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #b0aa9e;
  margin-bottom: 5px;
}
.item-row-title { font-size: 14px; font-weight: 400; color: #1a1814; margin-bottom: 3px; }
.item-row-sub { font-size: 12px; font-weight: 300; color: #9a9488; }
.item-row-actions { display: flex; gap: 8px; flex-shrink: 0; }
.edit-btn, .del-btn {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 6px 12px;
  border: none;
  cursor: pointer;
  transition: all 0.15s;
}
.edit-btn { background: #edeae3; color: #5a5448; border: 1px solid #dcd8d0; }
.edit-btn:hover { background: #e0dcd5; color: #1a1814; border-color: #c8c2b5; }
.del-btn { background: transparent; color: #c8c2b5; border: 1px solid #dcd8d0; }
.del-btn:hover { border-color: #b04030; color: #b04030; }

/* MODAL */
.modal-bg {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(26,24,20,0.35);
  z-index: 500;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(2px);
}
.modal-bg.on { display: flex; }
.modal {
  background: #fff;
  border: 1px solid #dcd8d0;
  width: 560px;
  max-width: 90vw;
  max-height: 90vh;
  overflow-y: auto;
  padding: 36px 40px;
  box-shadow: 0 12px 40px rgba(26,24,20,0.1);
}
.modal-title {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #9a9488;
  margin-bottom: 28px;
}
.form-group { margin-bottom: 20px; }
.form-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #9a9488;
  display: block;
  margin-bottom: 8px;
}
.form-input, .form-textarea, .form-select {
  width: 100%;
  background: #f5f2ed;
  border: 1px solid #dcd8d0;
  color: #1a1814;
  padding: 11px 14px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px;
  font-weight: 300;
  outline: none;
  transition: border-color 0.15s;
  word-break: keep-all;
}
.form-input:focus, .form-textarea:focus, .form-select:focus { border-color: #9a9488; }
.form-textarea { height: 100px; resize: vertical; }
.form-select option { background: #fff; color: #1a1814; }
.form-hint {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: #c8c2b5;
  margin-top: 6px;
  letter-spacing: 0.04em;
}
.modal-actions { display: flex; gap: 10px; margin-top: 28px; }
.save-btn {
  background: #1a1814;
  color: #f5f2ed;
  border: none;
  padding: 11px 24px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.15s;
  flex: 1;
}
.save-btn:hover { background: #3a3630; }
.cancel-btn {
  background: transparent;
  color: #9a9488;
  border: 1px solid #dcd8d0;
  padding: 11px 20px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.15s;
}
.cancel-btn:hover { border-color: #9a9488; color: #5a5448; }

/* CAREER EDIT */
.career-form { max-width: 600px; }
.career-tl-list { display: flex; flex-direction: column; gap: 1px; margin-bottom: 12px; }
.career-tl-row {
  background: #fff;
  border: 1px solid #dcd8d0;
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.career-tl-year { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #b0aa9e; width: 80px; flex-shrink: 0; }
.career-tl-content { flex: 1; font-size: 13px; color: #5a5448; }
.career-tl-content span { font-size: 11px; color: #c8c2b5; display: block; margin-top: 2px; }

/* TOAST */
.toast {
  position: fixed;
  bottom: 32px;
  right: 32px;
  background: #1a1814;
  color: #f5f2ed;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.08em;
  padding: 12px 20px;
  z-index: 999;
  transform: translateY(80px);
  opacity: 0;
  transition: all 0.3s ease;
}
.toast.show { transform: translateY(0); opacity: 1; }

/* EMPTY */
.empty-state {
  padding: 48px 0;
  text-align: center;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: #c8c2b5;
  letter-spacing: 0.08em;
}


/* ZAN TABS */
.zan-tab {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 10px 20px;
  border: none;
  background: none;
  cursor: pointer;
  color: #b0aa9e;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: color 0.15s;
}
.zan-tab.on { color: #1a1814; border-bottom-color: #1a1814; }
.zan-tab:hover { color: #5a5448; }

@media (max-width: 640px) {
  .admin-sidebar { width: 100%; position: static; height: auto; flex-direction: row; flex-wrap: wrap; padding: 20px; }
  .admin-content { margin-left: 0; padding: 24px 20px; }
  .admin-logo-name { margin-bottom: 0; margin-right: 24px; }
  .admin-nav { flex-direction: row; flex-wrap: wrap; gap: 0 16px; }
  .admin-sidebar-foot { display: none; }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-title">Theo Admin</div>
  <div class="login-box">
    <input type="password" id="pwInput" placeholder="Password" autocomplete="current-password">
    <button class="login-btn" id="loginBtn">Enter</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- ADMIN -->
<div class="admin-wrap" id="adminWrap">
  <div class="admin-sidebar">
    <div class="admin-logo">Admin Panel</div>
    <div class="admin-logo-name">Theo<span>.</span></div>
    <div class="admin-nav">
      <div class="admin-nav-item on" data-panel="blog">Blog</div>
      <div class="admin-nav-item" data-panel="tools">Tools</div>
      <div class="admin-nav-item" data-panel="zan">ZAN</div>
      <div class="admin-nav-item" data-panel="career">Career</div>
    </div>
    <div class="admin-sidebar-foot">
      <a class="goto-site" href="./index.html" target="_blank">↗ 홈페이지 보기</a>
      <button class="logout-btn" id="logoutBtn">로그아웃</button>
    </div>
  </div>

  <div class="admin-content">

    <!-- BLOG -->
    <div class="panel on" id="panel-blog">
      <div class="panel-header">
        <div>
          <div class="panel-title">Writing</div>
          <div class="panel-heading">Blog 글 관리</div>
        </div>
        <button class="add-btn" data-type="blog">+ 글 추가</button>
      </div>
      <div class="item-list" id="list-blog"></div>
    </div>

    <!-- TOOLS -->
    <div class="panel" id="panel-tools">
      <div class="panel-header">
        <div>
          <div class="panel-title">Tools &amp; Apps</div>
          <div class="panel-heading">툴 관리</div>
        </div>
        <button class="add-btn" data-type="tools">+ 툴 추가</button>
      </div>
      <div class="item-list" id="list-tools"></div>
    </div>

    <!-- ZAN -->
    <div class="panel" id="panel-zan">
      <div class="panel-header">
        <div>
          <div class="panel-title">Community</div>
          <div class="panel-heading">ZAN 관리</div>
        </div>
        <div style="display:flex;gap:8px;">
          <button class="add-btn" id="zan-add-cat-btn">+ 카테고리 추가</button>
          <button class="add-btn" id="zan-add-post-btn">+ 게시물 추가</button>
        </div>
      </div>
      <div style="display:flex;gap:0;margin-bottom:24px;border-bottom:1px solid #dcd8d0;">
        <button class="zan-tab on" data-tab="cats">카테고리</button>
        <button class="zan-tab" data-tab="posts">게시물</button>
      </div>
      <div id="zan-tab-cats">
        <div class="item-list" id="list-zan"></div>
      </div>
      <div id="zan-tab-posts" style="display:none;">
        <div style="margin-bottom:16px;">
          <select id="zan-post-filter" class="form-select" style="max-width:260px;">
            <option value="">전체 카테고리</option>
          </select>
        </div>
        <div class="item-list" id="list-zanposts"></div>
      </div>
    </div>

    <!-- CAREER -->
    <div class="panel" id="panel-career">
      <div class="panel-header">
        <div>
          <div class="panel-title">About</div>
          <div class="panel-heading">Career / Bio 수정</div>
        </div>
        <button class="add-btn" data-type="career">+ 타임라인 추가</button>
      </div>
      <div class="career-form">
        <div class="form-group">
          <label class="form-label">Bio 소개글</label>
          <textarea class="form-textarea" id="bioText" style="height:140px"></textarea>
          <div class="form-hint">줄바꿈은 Enter로 구분 (문단 구분)</div>
        </div>
        <button class="save-btn" id="saveBioBtn" style="max-width:160px">저장</button>
        <div style="margin-top:36px;margin-bottom:12px;font-family:'IBM Plex Mono',monospace;font-size:10px;color:#555;letter-spacing:0.1em;text-transform:uppercase;">Timeline</div>
        <div class="item-list" id="list-career"></div>
      </div>
    </div>

  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-title" id="modalTitle">항목 추가</div>
    <div id="modalBody"></div>
    <div class="modal-actions">
      <button class="save-btn" id="modalSave">저장</button>
      <button class="cancel-btn" id="modalCancel">취소</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

    try {
      var v = localStorage.getItem('theo_' + key);
      return v ? JSON.parse(v) : null;
    } catch(e) { return null; }
  }
  function save(key, val) {
    try { localStorage.setItem('theo_' + key, JSON.stringify(val)); } catch(e) {}
  }
  function getData(key) {
    return load(key) || JSON.parse(JSON.stringify(defaults[key] || []));
  }
  function nextId(arr) {
    return arr.reduce(function(m, i) { return Math.max(m, i.id || 0); }, 0) + 1;
  }

  function showToast(msg) {

  }

        '</div>' +
        '<div class="item-row-actions">' +
          '<button class="edit-btn" data-type="zanpost" data-id="' + item.id + '">수정</button>' +
          '<button class="del-btn" data-type="zanpost" data-id="' + item.id + '">삭제</button>' +
        '</div></div>';
    }).join('');
  }

  document.getElementById('zan-post-filter').addEventListener('change', renderZanPosts);

  // ── ZAN POST FORM ──
  function zanPostForm(item) {
    item = item || {};
    var cats = getData('zan');
    var catOptions = cats.map(function(c) {
      return '<option value="' + c.id + '"' + (item.catId == c.id ? ' selected' : '') + '>' + c.title + '</option>';
    }).join('');
    return '<div class="form-group"><label class="form-label">카테고리</label>' +
      '<select class="form-select" id="f-catid">' + catOptions + '</select></div>' +
      '<div class="form-group"><label class="form-label">제목</label><input class="form-input" id="f-title" value="' + (item.title||'') + '" placeholder="게시물 제목"></div>' +
      '<div class="form-group"><label class="form-label">한 줄 설명</label><input class="form-input" id="f-sub" value="' + (item.sub||'') + '" placeholder="설명 / 2026.03"></div>' +
      '<div class="form-group"><label class="form-label">이미지 URL</label><input class="form-input" id="f-img" value="' + (item.img||'') + '" placeholder="https://..."></div>';
  }

  function addZanPost() {
    var cats = getData('zan');
    if (!cats.length) { showToast('카테고리를 먼저 추가해주세요'); return; }
    openModal('게시물 추가', zanPostForm(), function() {
      var title = document.getElementById('f-title').value.trim();
      if (!title) { showToast('제목을 입력해주세요'); return; }
      var posts = getZanPosts();
      posts.unshift({
        id: posts.reduce(function(m, i) { return Math.max(m, i.id||0); }, 0) + 1,
        catId: parseInt(document.getElementById('f-catid').value),
        title: title,
        sub: document.getElementById('f-sub').value,
        img: document.getElementById('f-img').value
      });
      save('zanPosts', posts);
      renderZanPosts();
      closeModal();
      showToast('게시물이 추가되었습니다');
    });
  }

  function editZanPost(id) {
    var posts = getZanPosts();
    var item  = posts.filter(function(i) { return i.id == id; })[0];
    if (!item) return;
    openModal('게시물 수정', zanPostForm(item), function() {
      var title = document.getElementById('f-title').value.trim();
      if (!title) { showToast('제목을 입력해주세요'); return; }
      item.catId = parseInt(document.getElementById('f-catid').value);
      item.title = title;
      item.sub   = document.getElementById('f-sub').value;
      item.img   = document.getElementById('f-img').value;
      save('zanPosts', posts);
      renderZanPosts();
      closeModal();
      showToast('수정되었습니다');
    });
  }

  function delZanPost(id) {
    if (!confirm('삭제할까요?')) return;
    var posts = getZanPosts().filter(function(i) { return i.id != id; });
    save('zanPosts', posts);
    renderZanPosts();
    showToast('삭제되었습니다');
  }

  // ── RENDER ALL ──
  function renderAll() {
    renderBlog();
    renderTools();
    renderZan();
    renderCareer();
  }

})();
</script>
</body>
</html>
